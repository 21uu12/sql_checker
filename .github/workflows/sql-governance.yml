name: SQL Governance Circle

on:
  push:
    paths:
      - "**/*.sql"
      - "metadata/tables.json"
      - "circle.py"
      - "tools/**"
      - ".github/workflows/sql-governance.yml"
  pull_request:
    paths:
      - "**/*.sql"
      - "metadata/tables.json"
      - "circle.py"
      - "tools/**"
      - ".github/workflows/sql-governance.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  score-circle:
    runs-on: ubuntu-latest
    steps:
      - name: Check out SQL repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SQL parser
        run: python -m pip install --requirement requirements.txt

      - name: Score SQL Circle
        run: python circle.py . --metadata metadata/tables.json --out outputs/circle_report.md

      - name: Publish workflow summary
        run: cat outputs/circle_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Circle report
        uses: actions/upload-artifact@v4
        with:
          name: sql-governance-circle-report
          path: outputs/circle_report.md
          retention-days: 30

      - name: Comment Circle score on pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('outputs/circle_report.md', 'utf8');
            const score = report.match(/Circle score: \*\*(\d+\/100)\*\*/)[1];
            const evaluation = report.match(/Circle evaluation: \*\*(.+?)\*\*/)[1];
            const p1 = report.match(/P1 findings: (\d+)/)[1];
            const p2 = report.match(/P2 findings: (\d+)/)[1];
            const complex = report.match(/Complex SQL files requiring deeper review: (\d+)/)[1];
            const marker = '<!-- sql-governance-circle -->';
            const body = `${marker}\n## SQL Governance Circle\n\nScore: **${score}**  \nEvaluation: **${evaluation}**\n\n- P1 findings: ${p1}\n- P2 findings: ${p2}\n- Complex SQL files for deeper review: ${complex}\n\nSee the workflow summary or artifact for the full report.`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
