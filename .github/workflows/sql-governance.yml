name: SQL 增量治理

on:
  push:
    paths:
      - "sql/**/*.sql"
      - "metadata/tables.json"
      - "metadata/owners.json"
      - "changed_sql.py"
      - "tools/**"
      - ".github/workflows/sql-governance.yml"
  pull_request:
    paths:
      - "sql/**/*.sql"
      - "metadata/tables.json"
      - "metadata/owners.json"
      - "changed_sql.py"
      - "tools/**"
      - ".github/workflows/sql-governance.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review-changed-sql:
    runs-on: ubuntu-latest
    steps:
      - name: 检出 SQL 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 准备 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 SQL 解析依赖
        run: python -m pip install --requirement requirements.txt

      - name: 审查本次变更的 SQL
        run: python changed_sql.py --source sql --metadata metadata/tables.json --owner-metadata metadata/owners.json --notification-out outputs/n8n_payload.json --out outputs/changed_sql_report.md --baseline-ref HEAD^

      - name: 发布工作流摘要
        run: cat outputs/changed_sql_report.md >> "$GITHUB_STEP_SUMMARY"

      - name: 上传增量 SQL 报告
        uses: actions/upload-artifact@v4
        with:
          name: sql-governance-changed-sql-report
          path: |
            outputs/changed_sql_report.md
            outputs/n8n_payload.json
          retention-days: 30

      - name: 将审查结果交给 N8N
        env:
          N8N_WEBHOOK_URL: ${{ secrets.N8N_SQL_GOVERNANCE_WEBHOOK_URL }}
          N8N_WEBHOOK_TOKEN: ${{ secrets.N8N_SQL_GOVERNANCE_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$N8N_WEBHOOK_URL" ] || [ -z "$N8N_WEBHOOK_TOKEN" ]; then
            echo "未完整配置 N8N Webhook 或 Token，跳过发送。"
            exit 0
          fi
          curl --fail --show-error --silent --request POST "$N8N_WEBHOOK_URL" --header "Content-Type: application/json" --header "X-SQL-Governance-Token: $N8N_WEBHOOK_TOKEN" --data-binary @outputs/n8n_payload.json

      - name: 在拉取请求中评论 SQL 变更结果
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('outputs/changed_sql_report.md', 'utf8');
            const changed = report.match(/本次变更 SQL 文件：\*\*(\d+)\*\*/)[1];
            const p1 = report.match(/新增 P1 发现项：\*\*([+-]\d+)\*\*/)[1];
            const p2 = report.match(/新增 P2 发现项：\*\*([+-]\d+)\*\*/)[1];
            const worsened = report.match(/评分变差的 SQL：\*\*(\d+)\*\*/)[1];
            const marker = '<!-- sql-governance-circle -->';
            const body = `${marker}\n## SQL 增量治理\n\n- 本次变更 SQL 文件：${changed}\n- P1 发现项变化：${p1}\n- P2 发现项变化：${p2}\n- 评分变差的 SQL：${worsened}\n\n完整报告请查看工作流摘要或构建产物。`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
